# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → Connect repo → chọn branch → deploy
# Sau khi deploy: Environment → thêm MONGO_URI, JWT_SECRET (và biến khác từ .env local)

services:
  - type: web
    name: shop-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend-nestjs
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Khớp VITE_GOOGLE_REDIRECT_URI (frontend) và Google Console «Authorized redirect URIs»
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # VNPay — TMN + Hash Secret chỉ nhập trên Render (không commit)
      # VNPAY_RETURN_URL = https://<api-host>/api/payment/vnpay-return (đăng ký trên cổng VNPay)
      # FRONTEND_URL = https://ndsports.id.vn (hoặc nhiều origin: localhost,ndsports — trên Render dùng domain public)
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Origin API (không /api) — URL ảnh local /uploads/... (khi không dùng Cloudinary)
      - key: API_PUBLIC_URL
        sync: false
      # Cloudinary — ảnh admin bền sau redeploy (bắt buộc trên Render free)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: shop-uploads
      # Email đơn hàng (khách + admin) — không đặt = không gửi mail (chỉ thông báo trong app)
      # Gmail: dùng App Password (không phải password thường).
      #   EMAIL_USER=caonhatdinh04@gmail.com
      #   EMAIL_PASS=<16-ký-tự App Password từ Google>
      #   EMAIL_PASS phải là App Password, không phải mật khẩu Gmail thường!
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # Aliases SMTP_* (tuỳ chọn nếu muốn dùng SMTP server khác Gmail)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # Email admin nhận thông báo đơn hàng mới (có thể nhiều địa chỉ, cách nhau bởi dấu phẩy)
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: VNPAY_SANDBOX
        value: "true"
