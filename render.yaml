# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → Connect repo → chọn branch → deploy
# Sau khi deploy: Environment → thêm MONGO_URI, JWT_SECRET (và biến khác từ .env local)

services:
  - type: web
    name: shop-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend-nestjs
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Khớp VITE_GOOGLE_REDIRECT_URI (frontend) và Google Console «Authorized redirect URIs»
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
