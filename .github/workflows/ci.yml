# CI Pipeline - Chạy khi push hoặc pull request
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ========== Backend API (Node.js + MongoDB) ==========
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend_API/package-lock.json

      - name: Install dependencies (Backend)
        working-directory: ./Backend_API
        run: npm ci

      - name: Verify Backend env (validateEnv)
        working-directory: ./Backend_API
        env:
          NODE_ENV: development
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: SportsEcommerce
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          node -e "require('dotenv').config(); const v = require('./middleware/validateEnv'); v(); console.log('Backend env OK');"

      - name: Start server (smoke test - chạy 10s để kiểm tra khởi động)
        working-directory: ./Backend_API
        env:
          NODE_ENV: development
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: SportsEcommerce
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          ALLOWED_ORIGINS: http://localhost:5173
        shell: bash
        run: |
          set +e
          timeout 10s node server.js
          code=$?
          # GNU timeout: 124 = hết giờ, server vẫn chạy → smoke OK
          if [ "$code" -eq 124 ]; then
            echo "Smoke OK: server khởi động và chạy đến khi timeout."
            exit 0
          fi
          exit "$code"

  # ========== Frontend (React + Vite) ==========
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Fronted/package-lock.json

      - name: Install dependencies (Frontend)
        working-directory: ./Fronted
        run: npm ci

      - name: Build Frontend
        working-directory: ./Fronted
        run: npm run build

      - name: Lint Frontend
        working-directory: ./Fronted
        run: npm run lint
