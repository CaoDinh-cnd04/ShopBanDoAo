# CI — build backend NestJS + frontend Vite (cache npm theo từng package-lock)
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install dependencies
        working-directory: ./backend-nestjs
        run: npm ci

      - name: Build NestJS
        working-directory: ./backend-nestjs
        run: npm run build

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Fronted/package-lock.json

      - name: Install dependencies
        working-directory: ./Fronted
        run: npm ci

      - name: Lint
        working-directory: ./Fronted
        run: npm run lint

      - name: Build
        working-directory: ./Fronted
        run: npm run build
