# CI — backend-nestjs build + Fronted lint/build
# (Không dùng cache npm trên setup-node để tránh lỗi "paths were not resolved" khi lockfile đổi.)
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: ./backend-nestjs
        run: |
          npm ci
          npm run build

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Git info (debug)
        run: git log -1 --oneline && test -f Fronted/package-lock.json && echo "lockfile OK"

      - name: Install
        working-directory: ./Fronted
        run: npm ci

      - name: Lint
        working-directory: ./Fronted
        run: npx eslint src --ext js,jsx,ts,tsx --max-warnings 0

      - name: Build
        working-directory: ./Fronted
        run: npm run build
